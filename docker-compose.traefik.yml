services:
  tidsrapport:
    image: ghcr.io/tjelite1986/tidsrapport:latest
    container_name: tidsrapport
    restart: unless-stopped
    networks:
      - traefik
    volumes:
      - tidsrapport_data:/app/data
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://${DOMAIN}
      # Valfritt – krävs bara för AI-bildanalys av schema
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    labels:
      - "traefik.enable=true"
      # HTTPS-router
      - "traefik.http.routers.tidsrapport-secure.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.tidsrapport-secure.entrypoints=https"
      - "traefik.http.routers.tidsrapport-secure.tls=true"
      - "traefik.http.routers.tidsrapport-secure.tls.certresolver=${CERT_RESOLVER:-cloudflare}"
      - "traefik.http.routers.tidsrapport-secure.service=tidsrapport-service"
      - "traefik.http.services.tidsrapport-service.loadbalancer.server.port=3000"
      # HTTP -> HTTPS redirect (kräver att Traefik har en redirect-middleware)
      - "traefik.http.routers.tidsrapport.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.tidsrapport.entrypoints=http"
      - "traefik.http.routers.tidsrapport.middlewares=https-redirect@docker"

networks:
  traefik:
    external: true

volumes:
  tidsrapport_data:
