services:
  tidsrapport:
    image: ghcr.io/tjelite1986/tidsrapport:latest
    container_name: tidsrapport
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - tidsrapport_data:/app/data
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      # Valfritt – krävs bara för AI-bildanalys av schema
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

volumes:
  tidsrapport_data:
